<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ойыншы пульті</title>
    <style>
        body { background-color: #1f2833; color: white; font-family: Arial; text-align: center; margin: 0; padding: 20px; }
        select { font-size: 20px; padding: 10px; margin-bottom: 20px; border-radius: 10px;}
        .question { background: #0b0c10; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 2px solid #66fcf1;}
        .btn { display: block; width: 100%; padding: 20px; font-size: 20px; margin: 10px 0; border: none; border-radius: 10px; color: white; cursor: pointer; }
        .btn-a { background-color: #e23e57; }
        .btn-b { background-color: #52de97; }
        .btn-c { background-color: #3f72af; }
        .btn-d { background-color: #fce38a; color: black; }
    </style>
</head>
<body>

    <h2>Қай топтасыз?</h2>
    <select id="team">
        <option value="red">🚀 Қызыл зымыран</option>
        <option value="blue">🛸 Көк тәрелке</option>
    </select>

    <div class="question">
        <h3>Сұрақ 1: Қазақстанның елордасы қай қала?</h3>
        <!-- Бұл жерде тек B нұсқасы (Астана) дұрыс деп бағдарламаланған -->
        <button class="btn btn-a" onclick="sendAnswer(false)">A: Алматы</button>
        <button class="btn btn-b" onclick="sendAnswer(true)">B: Астана</button>
        <button class="btn btn-c" onclick="sendAnswer(false)">C: Шымкент</button>
        <button class="btn btn-d" onclick="sendAnswer(false)">D: Қарағанды</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        function sendAnswer(isCorrect) {
            const team = document.getElementById('team').value;
            
            if(isCorrect) {
                alert("ДҰРЫС! Кемеңіз алға жылжыды! 🎉");
            } else {
                alert("Қате! Келесі жолы мұқият болыңыз ❌");
            }

            // Серверге жауапты жіберу
            socket.emit('answer', { team: team, correct: isCorrect });
        }
    </script>
</body>
</html>
